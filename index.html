<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heston Automotive – Admin Portal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #f0f9ff 0%, #ffffff 100%);
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #101a56;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      padding: 40px 24px;
    }

    .logo-wrap {
      padding: 0;
    }

    .logo-wrap img {
      height: 90px;
      width: auto;
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      width: 100%;
      max-width: 600px;
    }

    .btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #ffffff;
      border: 2px solid #d9e4f2;
      border-radius: 16px;
      padding: 32px 20px;
      text-decoration: none;
      color: #101a56;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: all 0.22s ease;
      box-shadow: 0 2px 12px rgba(63,99,255,0.06);
      cursor: pointer;
    }

    .btn:hover {
      border-color: #3f63ff;
      background: #3f63ff;
      color: #fff;
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(63,99,255,0.22);
    }

    .btn:hover svg {
      stroke: #fff;
    }

    .btn svg {
      width: 36px;
      height: 36px;
      stroke: #3f63ff;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.22s ease;
    }

    .footer {
      color: #a0b0c8;
      font-size: 12px;
      margin-top: 8px;
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: 1fr;
        max-width: 320px;
      }
      .logo-wrap img {
        height: 70px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="logo-wrap">
      <img src="business-logo.png" alt="Heston Automotive Logo" />
    </div>

    <div class="grid">

      <a href="https://dealers-website-two.vercel.app/login?callbackUrl=%2Fapp%2Fdashboard" class="btn">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 8v4l3 3"/>
          <path d="M3 12h2M19 12h2M12 3v2M12 19v2"/>
        </svg>
        Dealer Website
      </a>

      <a href="https://car-service-website-alpha.vercel.app/login" class="btn">
        <svg viewBox="0 0 24 24">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
        </svg>
        Garage Website
      </a>

      <a href="https://video.hestonautomotive.com/" class="btn">
        <svg viewBox="0 0 24 24">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
        Video Website
      </a>

      <a href="https://appraise.hestonautomotive.com/" class="btn">
        <svg viewBox="0 0 24 24">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        Appraisal Website
      </a>

    </div>

    <p class="footer">&copy; 2026 Heston Automotive. All rights reserved.</p>
  </div>
</body>
</html>
